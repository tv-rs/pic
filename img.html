<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload </title>
  <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/live/3.1/firebase.js"></script>

  <link rel="stylesheet" href="img.css">
</head>

<body>
  <button id="add-image-btn">+</button>
  <button id="close-image-btn" style="display: none;" onclick="close_img()">&times;</button>

  <div class="loader" id="loaderpop" style="display: none;">
    <div id="centering">
      <img src="load.webp" style="height: 100vh; max-width:500px; object-fit: contain;" id="popimg" width="100%" height="100%" >
    </div>
  </div>
  <h1>Image Upload</h1> 
  <p>Upload your images here..... It will be added manually into the Gallery</p>
  <div id="collage-container" style="color: white;">
    loading...
    <input type="file" id="image-upload" accept="image/*" multiple hidden>
  </div>
  <script src="img.js"></script>
</body>

</html>
